<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HappyMinds - Sito in Arrivo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        /* RESET CSS di base per evitare margini strani */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6; /* Un grigio chiarissimo, molto pulito */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Occupa tutta l'altezza dello schermo */
            text-align: center;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Un'ombra leggera ed elegante */
            max-width: 500px;
            width: 100%;
        }

        .logo {
            font-size: 32px;
            font-weight: 600;
            color: #2c3e50; /* Un blu scuro professionale */
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .logo span {
            color: #3498db; /* Un tocco di azzurro per "Minds" */
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        p {
            font-size: 16px;
            font-weight: 300;
            color: #7f8c8d; /* Grigio per il testo secondario */
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto; /* Centra il loader */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Happy<span>Minds</span></div>
        
        <h1>Lavori in Corso</h1>
        
        <p>Stiamo mettendo a punto gli ultimi dettagli per offrirti un'esperienza straordinaria. Il nuovo sito sarà online a breve.</p>
        
        <div class="loader"></div>

        <div class="footer">
            &copy; 2023 HappyMinds Agency. Tutti i diritti riservati.
        </div>
    </div>

</body>
</html>
